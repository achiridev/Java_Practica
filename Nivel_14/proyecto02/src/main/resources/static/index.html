<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pedidos App - Iniciar Sesión</title>
    <link rel="stylesheet" href="/css/styles.css">
</head>
<body>
    <div class="auth-container">
        <div class="auth-card">
            <div class="auth-header">
                <h1>📦 Pedidos App</h1>
                <p>Gestión de pedidos y productos</p>
            </div>
            
            <div class="auth-tabs">
                <div class="auth-tab active" data-tab="login">Iniciar Sesión</div>
                <div class="auth-tab" data-tab="register">Registrarse</div>
            </div>

            <!-- Login Form -->
            <form id="login-form" class="auth-form">
                <div class="form-group">
                    <label for="login-email">Email</label>
                    <input type="email" id="login-email" name="email" required placeholder="tu@email.com">
                </div>
                <div class="form-group">
                    <label for="login-password">Contraseña</label>
                    <input type="password" id="login-password" name="password" required placeholder="••••••••">
                </div>
                <button type="submit" class="btn btn-primary">Ingresar</button>
            </form>

            <!-- Register Form -->
            <form id="register-form" class="auth-form hidden">
                <div class="form-group">
                    <label for="register-nombres">Nombres</label>
                    <input type="text" id="register-nombres" name="nombres" required placeholder="Juan Pérez" minlength="2" maxlength="50">
                </div>
                <div class="form-group">
                    <label for="register-email">Email</label>
                    <input type="email" id="register-email" name="email" required placeholder="tu@email.com">
                </div>
                <div class="form-group">
                    <label for="register-password">Contraseña</label>
                    <input type="password" id="register-password" name="password" required placeholder="Mínimo 8 caracteres" minlength="8" maxlength="25">
                </div>
                <button type="submit" class="btn btn-success">Crear Cuenta</button>
            </form>
        </div>
    </div>

    <script src="/js/api.js"></script>
    <script src="/js/app.js"></script>
    <script>
        if (App.session.estaActiva()) {
            window.location.href = 'dashboard.html';
        }

        document.querySelectorAll('.auth-tab').forEach(tab => {
            tab.addEventListener('click', () => {
                document.querySelectorAll('.auth-tab').forEach(t => t.classList.remove('active'));
                document.querySelectorAll('.auth-form').forEach(f => f.classList.add('hidden'));
                
                tab.classList.add('active');
                const formId = tab.dataset.tab === 'login' ? 'login-form' : 'register-form';
                document.getElementById(formId).classList.remove('hidden');
            });
        });

        document.getElementById('login-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('login-email').value;
            const password = document.getElementById('login-password').value;
            
            App.notificaciones.info('Verificando credenciales...');
            
            try {
                const cliente = await api.cliente.login({ email, password });
                App.session.iniciar({ id: cliente.id, email: cliente.email, nombres: cliente.nombres });
                App.notificaciones.success('¡Bienvenido!');
                window.location.href = 'dashboard.html';
            } catch (error) {
                App.notificaciones.error('Credenciales inválidas.');
            }
        });

        document.getElementById('register-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const nombres = document.getElementById('register-nombres').value;
            const email = document.getElementById('register-email').value;
            const password = document.getElementById('register-password').value;
            
            try {
                const cliente = await api.cliente.crear({ nombres, email, password });
                App.session.iniciar({ id: cliente.id, email: cliente.email, nombres: cliente.nombres });
                App.notificaciones.success('¡Cuenta creada exitosamente!');
                window.location.href = 'dashboard.html';
            } catch (error) {
                App.notificaciones.error(error.message || 'Error al crear la cuenta');
            }
        });
    </script>
</body>
</html>
