<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>API JWT - Panel de Prueba</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
    <header>
        <div class="container header-content">
            <div class="logo">
                <div class="logo-icon">🔐</div>
                <span>API JWT - Prueba</span>
            </div>
            <nav>
                <button id="btn-login-nav" data-page="page-login">Login</button>
                <button id="btn-register-nav" data-page="page-register">Registro</button>
                <button id="btn-perfil-nav" data-page="page-perfil">Perfil</button>
                <button id="btn-test-nav" data-page="page-test">Test Endpoints</button>
                <button id="btn-logout-nav" class="btn-logout">Cerrar Sesión</button>
            </nav>
        </div>
    </header>

    <main class="container">
        <div id="page-login" class="page">
            <div class="card">
                <h2>Iniciar Sesión</h2>
                <div id="login-message" class="message hidden"></div>
                <form id="form-login">
                    <div class="form-group">
                        <label for="login-email">Email</label>
                        <input type="email" id="login-email" placeholder="tu@email.com" required>
                    </div>
                    <div class="form-group">
                        <label for="login-password">Contraseña</label>
                        <input type="password" id="login-password" placeholder="Contraseña" required>
                    </div>
                    <button type="submit" class="btn">Iniciar Sesión</button>
                </form>
            </div>
        </div>

        <div id="page-register" class="page">
            <div class="card">
                <h2>Registrarse</h2>
                <div id="register-message" class="message hidden"></div>
                <form id="form-register">
                    <div class="form-group">
                        <label for="register-name">Nombre</label>
                        <input type="text" id="register-name" placeholder="Tu nombre" required>
                    </div>
                    <div class="form-group">
                        <label for="register-email">Email</label>
                        <input type="email" id="register-email" placeholder="tu@email.com" required>
                    </div>
                    <div class="form-group">
                        <label for="register-password">Contraseña</label>
                        <input type="password" id="register-password" placeholder="Contraseña" required>
                    </div>
                    <button type="submit" class="btn">Registrarse</button>
                </form>
            </div>
        </div>

        <div id="page-perfil" class="page">
            <div class="card info-card">
                <h2>Mi Perfil</h2>
                <div id="perfil-message" class="message hidden"></div>
                <button id="btn-load-perfil" class="btn">Cargar Perfil</button>
                <div id="perfil-data" class="hidden">
                    <div class="info-item">
                        <span class="info-label">Email:</span>
                        <span id="perfil-email" class="info-value"></span>
                    </div>
                    <div class="info-item">
                        <span class="info-label">Roles:</span>
                        <div id="perfil-roles" class="roles-list"></div>
                    </div>
                </div>
            </div>
        </div>

        <div id="page-test" class="page">
            <div class="card">
                <h2>Probar Endpoints</h2>
                
                <div class="endpoint-test">
                    <h3><span class="method get">GET</span> Endpoint Público</h3>
                    <div class="endpoint-path">/api/public/info</div>
                    <button id="btn-public-info" class="btn">Probar</button>
                    <div id="result-public-info" class="test-result pending">Sin probar</div>
                </div>

                <div class="endpoint-test">
                    <h3><span class="method post">POST</span> Login</h3>
                    <div class="endpoint-path">/api/auth/login</div>
                    <div class="form-group">
                        <label for="test-login-email">Email:</label>
                        <input type="email" id="test-login-email" placeholder="tu@email.com">
                    </div>
                    <div class="form-group">
                        <label for="test-login-password">Contraseña:</label>
                        <input type="password" id="test-login-password" placeholder="Contraseña">
                    </div>
                    <button id="btn-auth-login" class="btn">Probar</button>
                    <div id="result-auth-login" class="test-result pending">Sin probar</div>
                </div>

                <div class="endpoint-test">
                    <h3><span class="method post">POST</span> Registro</h3>
                    <div class="endpoint-path">/api/auth/register</div>
                    <div class="form-group">
                        <label for="test-register-name">Nombre:</label>
                        <input type="text" id="test-register-name" placeholder="Tu nombre">
                    </div>
                    <div class="form-group">
                        <label for="test-register-email">Email:</label>
                        <input type="email" id="test-register-email" placeholder="tu@email.com">
                    </div>
                    <div class="form-group">
                        <label for="test-register-password">Contraseña:</label>
                        <input type="password" id="test-register-password" placeholder="Contraseña">
                    </div>
                    <button id="btn-auth-register" class="btn">Probar</button>
                    <div id="result-auth-register" class="test-result pending">Sin probar</div>
                </div>

                <div class="endpoint-test">
                    <h3><span class="method get">GET</span> Perfil (Requiere JWT)</h3>
                    <div class="endpoint-path">/api/user/perfil</div>
                    <div class="form-group">
                        <label for="test-perfil-token">Token JWT:</label>
                        <input type="text" id="test-perfil-token" placeholder="Pega tu token JWT aquí">
                    </div>
                    <button id="btn-user-perfil" class="btn">Probar</button>
                    <div id="result-user-perfil" class="test-result pending">Sin probar</div>
                </div>

                <button id="btn-test-all" class="btn" style="margin-top: 20px;">Probar Todos</button>
            </div>
        </div>
    </main>

    <script src="/js/app.js"></script>
</body>
</html>
